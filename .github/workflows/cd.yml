name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, staging, develop]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set environment
        id: env
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ "$BRANCH" = "main" ]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "PORT=80" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "PORT=8081" >> $GITHUB_OUTPUT
          else
            echo "ENV=develop" >> $GITHUB_OUTPUT
            echo "PORT=8082" >> $GITHUB_OUTPUT
          fi

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/github-actions-kubernetes-masterclass
            git fetch --all
            git checkout ${{ github.event.workflow_run.head_branch }}
            git pull origin ${{ github.event.workflow_run.head_branch }}
            if [ ! -f .env ]; then
              echo "ERROR: .env missing"
              exit 1
            fi
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "Deployed to ${{ steps.env.outputs.ENV }} environment"
